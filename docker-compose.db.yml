version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: machnic-mysql
    restart: always
    environment:
      MYSQL_DATABASE: machnic
      MYSQL_ROOT_PASSWORD: ramU0011@@
    ports:
      - "33306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: machnic-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ramU0011@@
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
